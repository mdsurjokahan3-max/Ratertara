<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পরিচয় প্রদান করুন</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #ff4d6d; --bg: #fff0f3; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8f9fa; display: flex; justify-content: center; padding: 15px; }
        
        .form-card { width: 100%; max-width: 400px; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .form-card h2 { color: var(--primary); text-align: center; margin-bottom: 20px; font-size: 22px; border-bottom: 2px solid var(--primary); display: inline-block; width: 100%; padding-bottom: 10px; }
        
        label { display: block; margin: 10px 0 5px; font-size: 14px; font-weight: bold; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; background: #fdfdfd; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); }
        
        .file-box { display: block; background: #f9f9f9; padding: 15px; border: 2px dashed #ccc; border-radius: 8px; text-align: center; cursor: pointer; margin: 15px 0; color: #777; }
        .file-box i { font-size: 25px; color: var(--primary); display: block; margin-bottom: 5px; }
        
        .btn-submit { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-submit:hover { background: #e63946; }
        .btn-back { display: block; text-align: center; margin-top: 15px; color: #666; text-decoration: none; font-size: 14px; }
        
        #preview-name { font-size: 11px; color: green; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>আপনার পরিচয় দিন</h2>
    
    <form id="bioForm">
        <label>আপনার নাম</label>
        <input type="text" id="u-name" placeholder="নাম লিখুন" required>

        <label>লিঙ্গ</label>
        <select id="u-gender" required>
            <option value="">নির্বাচন করুন</option>
            <option>পুরুষ</option>
            <option>মহিলা</option>
        </select>

        <label>বয়স</label>
        <select id="u-age" required>
            <option value="">বয়স নির্বাচন করুন</option>
        </select>

        <label>বিভাগ</label>
        <select id="u-div" onchange="updateDistricts()" required>
            <option value="">বিভাগ নির্বাচন করুন</option>
            <option>ঢাকা</option>
            <option>চট্টগ্রাম</option>
            <option>রাজশাহী</option>
            <option>খুলনা</option>
            <option>বরিশাল</option>
            <option>সিলেট</option>
            <option>রংপুর</option>
            <option>ময়মনসিংহ</option>
        </select>

        <label>জেলা</label>
        <select id="u-dist" required>
            <option value="">আগে বিভাগ নির্বাচন করুন</option>
        </select>

        <!-- থানা ঘরটি সচল করা হয়েছে -->
        <label>থানা/উপজেলা</label>
        <input type="text" id="u-thana" placeholder="আপনার থানা লিখুন" required>

        <label>শিক্ষাগত যোগ্যতা</label>
        <select id="u-edu">
            <option value="">নির্বাচন করুন</option>
            <option>প্রাথমিক</option>
            <option>মাধ্যমিক</option>
            <option>উচ্চ মাধ্যমিক</option>
            <option>স্নাতক/ডিগ্রি</option>
            <option>স্নাতকোত্তর</option>
            <option>অন্যান্য</option>
        </select>

        <label>বৈবাহিক অবস্থা</label>
        <select id="u-marital">
            <option value="">নির্বাচন করুন</option>
            <option>অবিবাহিত</option>
            <option>বিবাহিত</option>
            <option>ডিভোর্সড</option>
            <option>বিপত্নীক/বিধবা</option>
        </select>

        <label>নিজের সম্পর্কে লিখুন</label>
        <textarea id="u-bio" rows="3" placeholder="আপনার সম্পর্কে কিছু বলুন..."></textarea>

        <label class="file-box" for="u-file">
            <i class="fa fa-cloud-upload-alt"></i>
            গ্যালারি থেকে ছবি সিলেক্ট করুন
        </label>
        <input type="file" id="u-file" accept="image/*" style="display:none" onchange="showName()">
        <div id="preview-name"></div>

        <label>মোবাইল নম্বর</label>
        <input type="tel" id="u-phone" placeholder="xxxxxxxx" required>

        <button type="button" id="submitBtn" class="btn-submit" onclick="uploadData()">বিজ্ঞাপন প্রকাশ করুন</button>
        
        <a href="https://ratertara.rf.gd" class="btn-back"><i class="fa fa-arrow-left"></i> হোম পেজে ফিরে যান</a>
    </form>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    // --- টেলিগ্রাম কনফিগারেশন ---
    const TELEGRAM_BOT_TOKEN = '8279372040:AAGKfFsmnkI5ihQE-T2v6hU47dEoZ892_nA'; 
    const TELEGRAM_CHAT_ID = '-1002967304716'; 

    const districts = {
        "ঢাকা": ["ঢাকা", "গাজীপুর", "নারায়ণগঞ্জ", "নরসিংদী", "মানিকগঞ্জ", "মুন্সীগঞ্জ", "রাজবাড়ী", "মাদারীপুর", "গোপালগঞ্জ", "ফরিদপুর", "শরীয়তপুর", "টাঙ্গাইল", "কিশোরগঞ্জ"],
        "চট্টগ্রাম": ["চট্টগ্রাম", "কুমিল্লা", "ফেনী", "ব্রাহ্মণবাড়িয়া", "নোয়াখালী", "লক্ষ্মীপুর", "চাঁদপুর", "কক্সবাজার", "খাগড়াছড়ি", "রাঙ্গামাটি", "বান্দরবান"],
        "রাজশাহী": ["রাজশাহী", "বগুড়া", "পাবনা", "সিরাজগঞ্জ", "নাটোর", "নওগাঁ", "চাঁপাইনবাবগঞ্জ", "জয়পুরহাট"],
        "খুলনা": ["খুলনা", "যশোর", "ঝিনাইদহ", "কুষ্টিয়া", "মাগুরা", "নড়াইল", "বাগেরহাট", "সাতক্ষীরা", "চুয়াডাঙ্গা", "মেহেরপুর"],
        "বরিশাল": ["বরিশাল", "ভোলা", "পটুয়াখালী", "পিরোজপুর", "ঝালকাঠি", "বরগুনা"],
        "সিলেট": ["সিলেট", "মৌলভীবাজার", "হবিগঞ্জ", "সুনামগঞ্জ"],
        "রংপুর": ["রংপুর", "দিনাজপুর", "কুড়িগ্রাম", "গাইবান্ধা", "নীলফামারী", "পঞ্চগড়", "ঠাকুরগাঁও", "লালমনিরহাট"],
        "ময়মনসিংহ": ["ময়মনসিংহ", "জামালপুর", "নেত্রকোনা", "শেরপুর"]
    };

    const ageSelect = document.getElementById('u-age');
    for(let i=18; i<=70; i++){
        let opt = document.createElement('option');
        opt.value = i; opt.innerHTML = i + " বছর";
        ageSelect.appendChild(opt);
    }

    function updateDistricts() {
        const div = document.getElementById('u-div').value;
        const distSelect = document.getElementById('u-dist');
        distSelect.innerHTML = '<option value="">জেলা নির্বাচন করুন</option>';
        if(div && districts[div]) {
            districts[div].forEach(d => {
                let opt = document.createElement('option');
                opt.value = d; opt.innerHTML = d;
                distSelect.appendChild(opt);
            });
        }
    }

    function showName() {
        const file = document.getElementById('u-file').files[0];
        document.getElementById('preview-name').innerText = file ? "সিলেক্ট হয়েছে: " + file.name : "";
    }

    const firebaseConfig = {
      apiKey: "AIzaSyChIYQQGwt5fURSgzmdMOXOUgXa2SAlmCs",
      databaseURL: "https://ratertara-rfgd-default-rtdb.firebaseio.com",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function uploadData() {
        const name = document.getElementById('u-name').value;
        const gender = document.getElementById('u-gender').value;
        const age = document.getElementById('u-age').value;
        const dist = document.getElementById('u-dist').value;
        const thana = document.getElementById('u-thana').value;
        const edu = document.getElementById('u-edu').value;
        const marital = document.getElementById('u-marital').value;
        const bio = document.getElementById('u-bio').value;
        const phone = document.getElementById('u-phone').value;
        const fileInput = document.getElementById('u-file');

        if(!name || !thana || !phone || !fileInput.files[0]) {
            alert("অনুগ্রহ করে নাম, থানা, মোবাইল এবং ছবি দিন!"); return;
        }

        const btn = document.getElementById('submitBtn');
        btn.innerText = "আপলোড হচ্ছে..."; btn.disabled = true;

        const file = fileInput.files[0];
        const reader = new FileReader();
        reader.readAsDataURL(file);
        
        reader.onload = async function () {
            const base64Img = reader.result;
            const postData = {
                name: name,
                gender: gender,
                age: age,
                dist: dist,
                thana: thana,
                edu: edu,
                marital: marital,
                bio: bio,
                call: phone,
                img: base64Img
            };

            try {
                // ১. ফায়ারবেস ডেটাবেসে আপলোড
                await db.ref('profiles').push(postData);

                // ২. টেলিগ্রাম বট-এ ছবিসহ তথ্য পাঠানো
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM_CHAT_ID);
                formData.append('photo', file);
                formData.append('caption', `প্রেমের বিজ্ঞাপন প্রচার !\n\nনাম: ${name}\nলিঙ্গ: ${gender}\nবয়স: ${age}\nজেলা: ${dist}\nথানা: ${thana}\nশিক্ষা: ${edu}\nবৈবাহিক অবস্থা: ${marital}\nমোবাইল: ${phone}\n\nবায়ো: ${bio}`);

                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });

                alert("সফলভাবে বিজ্ঞাপন প্রকাশ হয়েছে!");
                location.reload(); 
                
            } catch (e) {
                alert("ত্রুটি হয়েছে! আবার চেষ্টা করুন।");
                btn.innerText = "বিজ্ঞাপন প্রকাশ করুন"; btn.disabled = false;
            }
        };
    }
</script>
</body>
</html>
