<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:340px;
    background:#f3f4f6;
    padding:20px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

#adsBox{
    margin-top:10px;
    display:none;
}

#status{
    margin-top:10px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="box">
    <h2>Verification</h2>

    <p id="status">Starting...</p>

    <button id="continueBtn" style="display:none;">Continue to Website</button>

    <div id="adsBox"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ===== FIREBASE CONFIG =====
const firebaseConfig = {
  apiKey: "AIzaSyC...",
  authDomain: "ratertara-rfgd.firebaseapp.com",
  databaseURL: "https://ratertara-rfgd-default-rtdb.firebaseio.com",
  projectId: "ratertara-rfgd",
  storageBucket: "ratertara-rfgd.firebasestorage.app",
  messagingSenderId: "624181865811",
  appId: "1:624181865811:web:e3283ed9718becf98505a6",
  measurementId: "G-T87GCRSB8V"
};

// init firebase
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const status = document.getElementById("status");
const btn = document.getElementById("continueBtn");
const adsBox = document.getElementById("adsBox");

let verified = false;

// ===== ADS LOAD =====
function loadAds(){
    const script = document.createElement("script");
    script.src = "https://pl28030591.effectivecpmnetwork.com/58/67/e1/5867e18023cf6a8b2d757323591ba74f.js";
    script.async = true;
    adsBox.appendChild(script);
}

// ===== SAVE VISIT TO FIREBASE =====
function saveVisit(){
    const visitRef = push(ref(db, "visits"));
    set(visitRef, {
        time: Date.now(),
        verified: true
    });
}

// ===== AUTO VERIFY =====
window.onload = () => {
    let t = 5;

    let interval = setInterval(() => {
        status.innerText = "Verifying... " + t + "s";
        t--;

        if(t < 0){
            clearInterval(interval);

            verified = true;
            status.innerText = "Verified ";

            adsBox.style.display = "block";
            loadAds();

            btn.style.display = "block";

            // save to firebase
            saveVisit();
        }
    },1000);
};

// ===== REDIRECT =====
btn.onclick = () => {
    if(!verified) return;

    // 👉 তোমার লিংক এখানে বসাবে
    window.location.href = "https://ratertara.vercel.app/";
};
</script>

</body>
</html>
