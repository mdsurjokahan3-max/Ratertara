<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify & Continue</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:340px;
    background:#f3f4f6;
    padding:20px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.checkbox{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-top:10px;
}

button{
    width:100%;
    padding:10px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

#adsBox{
    margin-top:15px;
    display:none;
}

#status{
    margin-top:10px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="box">
    <h2> Verify You Are Human</h2>

    <p id="status">Please verify to continue...</p>

    <div class="checkbox">
        <input type="checkbox" id="check">
        <label>I am not a robot</label>
    </div>

    <button id="btn">Verify</button>

    <div id="adsBox"></div>
</div>

<script>
const btn = document.getElementById("btn");
const check = document.getElementById("check");
const status = document.getElementById("status");
const adsBox = document.getElementById("adsBox");

let verified = false;

// ===== VERIFY SYSTEM =====
btn.onclick = () => {

    if(!check.checked){
        status.innerText = "❌ Please confirm checkbox first";
        return;
    }

    let t = 5;
    btn.disabled = true;

    status.innerText = "Verifying... " + t + "s";

    let interval = setInterval(() => {
        t--;
        status.innerText = "Verifying... " + t + "s";

        if(t < 0){
            clearInterval(interval);

            verified = true;
            status.innerText = "✔ Verified Successfully";

            loadAds();
        }
    },1000);
};

// ===== ADS LOAD =====
function loadAds(){

    adsBox.style.display = "block";

    const script = document.createElement("script");
    script.src = "https://pl28030591.effectivecpmnetwork.com/58/67/e1/5867e18023cf6a8b2d757323591ba74f.js";
    script.async = true;

    script.onload = () => {
        status.innerText = "  Loaded... Redirecting soon";
    };

    script.onerror = () => {
        status.innerText = "❌ Ads failed to load, redirecting...";
    };

    adsBox.appendChild(script);

    // ===== welcome to ratertara  =====
    setTimeout(() => {
        window.location.href = "https://www.effectivecpmnetwork.com/xhfzs2jc?key=ee214a0532a429bbac69f35c12c6a33b";
    }, 5000);
}
</script>
    
<script src="https://pl28030600.effectivecpmnetwork.com/3a/39/2e/3a392ef12ec9411fdf1fcc8c22f2cc9d.js"></script>
    
</body>
</html>
