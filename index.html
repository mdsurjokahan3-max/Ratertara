<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Verified Ads System</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#ffffff;
    color:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:320px;
    background:#f3f4f6;
    padding:20px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

#adsBox{
    margin-top:15px;
    display:none;
}

#status{
    font-size:14px;
    margin-top:10px;
}

.badge{
    display:inline-block;
    padding:5px 10px;
    background:#e5e7eb;
    border-radius:20px;
    font-size:12px;
    margin-top:8px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Welcome to ratertara </h2>

    <div class="badge">ভিজিট করুন </div>

    <p id="status">Starting...</p>

    <div id="adsBox"></div>
</div>

<script>
const status = document.getElementById("status");
const adsBox = document.getElementById("adsBox");

let verified = false;

// ===== AUTO VERIFICATION =====
window.onload = () => {
    let time = 5;

    status.innerText = "Verifying automatically... " + time + "s";

    let interval = setInterval(() => {
        time--;
        status.innerText = "Verifying automatically... " + time + "s";

        if(time < 0){
            clearInterval(interval);

            verified = true;
            status.innerText = " Loading...";

            loadAds();
        }
    }, 1000);
};

// ===== ADS LOADER =====
function loadAds(){

    if(!verified) return;

    adsBox.style.display = "block";

    const script = document.createElement("script");
    script.src = "https://pl28030591.effectivecpmnetwork.com/58/67/e1/5867e18023cf6a8b2d757323591ba74f.js";
    script.async = true;

    script.onload = () => {
        status.innerText = " Successfully ✔";
    };

    script.onerror = () => {
        status.innerText = "Ads Failed ❌";
    };

    adsBox.appendChild(script);
}
</script>

</body>
</html>
