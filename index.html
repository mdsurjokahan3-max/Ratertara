<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoHub - Rater Tara</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="top-nav">
        <div class="logo"><i class="fab fa-youtube"></i> VideoHub</div>
        <div class="header-right">
            <i class="fas fa-search" onclick="alert('Search Coming Soon')"></i>
            <img src="https://i.pravatar.cc/100" class="avatar" onclick="showSection('profile-section')">
        </div>
    </header>

    <main id="app-content">
        <!-- Home Feed -->
        <section id="home-section" class="content-section">
            <h3 class="section-title">🎬 Featured Videos</h3>
            <div id="videoGrid" class="video-grid">
                <!-- ভিডিও এখানে লোড হবে -->
            </div>
        </section>

        <!-- Publish Section -->
        <section id="upload-section" class="content-section" style="display:none;">
            <div class="card-form">
                <h3><i class="fas fa-plus-circle"></i> Publish New Video</h3>
                <input type="text" id="vTitle" placeholder="Video Title">
                <select id="vSource">
                    <option value="youtube">YouTube Link</option>
                    <option value="drive">Google Drive Link</option>
                </select>
                <input type="text" id="vLink" placeholder="Paste Video Link Here">
                <button class="btn-primary" onclick="publishVideo()">Publish Video</button>
            </div>
        </section>

        <!-- Profile Dashboard -->
        <section id="profile-section" class="content-section" style="display:none;">
            <div class="profile-header">
                <img src="https://i.pravatar.cc/150" class="p-img">
                <h2>User Dashboard</h2>
                <p style="color: #888;">Manage your shared videos here</p>
                <div id="adminVideoList" style="margin-top: 20px;">
                    <!-- ভিডিও কন্ট্রোল লিস্ট -->
                </div>
                <button class="btn-sec" onclick="location.reload()">Refresh App</button>
            </div>
        </section>
    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="showSection('home-section')"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="alert('Shorts Ready')"><i class="fas fa-bolt"></i><span>Shorts</span></div>
        <div class="nav-plus" onclick="showSection('upload-section')"><i class="fas fa-plus"></i></div>
        <div class="nav-item"><i class="fas fa-heart"></i><span>Fav</span></div>
        <div class="nav-item" onclick="showSection('profile-section')"><i class="fas fa-user-circle"></i><span>Profile</span></div>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>।
